<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chatterly — Instagram bağlantısı</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #161512;
    color: #f5f0e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
    padding: 24px;
  }
  p { max-width: 320px; line-height: 1.5; }
  a { color: #d8a651; }
</style>
</head>
<body>
  <p id="message">Chatterly uygulamasına yönlendiriliyorsun&hellip;</p>
  <script>
    // Facebook's OAuth dialog only accepts https:// redirect URIs, so this
    // page exists purely to bounce the ?code=/?error= query string back into
    // the app's own instabot://redirect custom scheme (see
    // app/src/services/instagramAuth.ts).
    var appUrl = 'instabot://redirect' + window.location.search;
    window.location.replace(appUrl);
    setTimeout(function () {
      document.getElementById('message').textContent =
        'Bu sayfayı kapatabilirsin ve Chatterly uygulamasına dönebilirsin.';
    }, 1500);
  </script>
</body>
</html>
